<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Landscape Regeneration Assessment</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="report" class="report" aria-label="Landscape Regeneration Assessment report"></main>
    <script src="report-data.js"></script>
    <script>
      const data = window.reportData;
      const report = document.getElementById("report");

      const el = (tag, className, text) => {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined) node.textContent = text;
        return node;
      };

      const page = (className = "") => {
        const section = el("section", `page ${className}`.trim());
        report.append(section);
        return section;
      };

      const header = (parent, kicker, title, intro) => {
        const block = el("header", "section-header");
        block.append(el("p", "kicker", kicker));
        block.append(el("h2", "", title));
        if (intro) block.append(el("p", "section-intro", intro));
        parent.append(block);
      };

      const footer = (parent) => {
        const f = el("footer", "page-footer");
        f.append(el("span", "", data.business.name));
        const pageNumber = Array.from(report.children).indexOf(parent) + 1;
        f.append(el("span", "", `${data.report.footerText} | Page ${pageNumber}`));
        parent.append(f);
      };

      const paragraphList = (items) => {
        const div = el("div", "prose");
        items.forEach((item) => div.append(el("p", "", item)));
        return div;
      };

      const statGrid = (items) => {
        const grid = el("div", "stat-grid");
        items.forEach((item) => {
          const card = el("article", "stat-card");
          card.append(el("span", "stat-label", item.label));
          card.append(el("strong", "", item.value));
          if (item.note) card.append(el("small", "", item.note));
          grid.append(card);
        });
        return grid;
      };

      const callout = (title, body) => {
        const box = el("aside", "callout");
        box.append(el("h3", "", title));
        box.append(el("p", "", body));
        return box;
      };

      const mapPanel = (map) => {
        const figure = el("figure", `map-panel ${map.size || ""}`.trim());
        const wrap = el("div", "map-image-wrap");
        const img = el("img", "map-image");
        img.src = map.src;
        img.alt = map.alt;
        wrap.append(img);

        const legend = el("div", "map-legend");
        legend.append(el("strong", "", "Legend"));
        map.legend.forEach((item) => {
          const row = el("span", "legend-item");
          const swatch = el("i", "");
          swatch.style.background = item.color;
          row.append(swatch, document.createTextNode(item.label));
          legend.append(row);
        });

        wrap.append(legend);
        figure.append(wrap);
        const caption = el("figcaption", "");
        caption.append(el("strong", "", map.title));
        caption.append(document.createTextNode(` ${map.caption}`));
        figure.append(caption);
        return figure;
      };

      const twoColumnList = (items) => {
        const grid = el("div", "two-column-list");
        items.forEach((item) => {
          const block = el("article", "");
          block.append(el("h3", "", item.title));
          block.append(el("p", "", item.body));
          grid.append(block);
        });
        return grid;
      };

      const worksTable = (rows) => {
        return dataTable(["Recommended work", "Purpose", "Priority"], rows, ["work", "purpose", "priority"]);
      };

      const dataTable = (headers, rows, keys) => {
        const table = el("table", "report-table compact-table");
        const thead = el("thead");
        const headRow = el("tr");
        headers.forEach((h) => headRow.append(el("th", "", h)));
        thead.append(headRow);
        table.append(thead);
        const tbody = el("tbody");
        rows.forEach((row) => {
          const tr = el("tr");
          keys.forEach((key) => tr.append(el("td", "", row[key])));
          tbody.append(tr);
        });
        table.append(tbody);
        return table;
      };

      const photoGrid = (items) => {
        const grid = el("div", "photo-grid");
        items.forEach((item) => {
          const card = el("article", "photo-card");
          const img = el("img", "");
          img.src = item.src;
          img.alt = item.alt;
          card.append(img);
          card.append(el("h3", "", item.title));
          ["observed", "interpretation", "response"].forEach((key) => {
            const row = el("p", "");
            row.append(el("strong", "", `${item.labels[key]} `));
            row.append(document.createTextNode(item[key]));
            card.append(row);
          });
          grid.append(card);
        });
        return grid;
      };

      const budgetOptions = (items) => {
        const grid = el("div", "budget-grid");
        items.forEach((item) => {
          const card = el("article", "budget-card");
          card.append(el("p", "budget-tier", item.tier));
          card.append(el("h3", "", item.title));
          card.append(el("strong", "budget-total", item.range));
          const ul = el("ul", "");
          item.includes.forEach((include) => ul.append(el("li", "", include)));
          card.append(ul);
          grid.append(card);
        });
        return grid;
      };

      const cover = page("cover");
      const coverTop = el("div", "cover-top");
      coverTop.append(el("p", "business-positioning", data.business.positioning));
      coverTop.append(el("p", "report-type", data.report.type));
      cover.append(coverTop);
      const coverTitle = el("div", "cover-title");
      coverTitle.append(el("h1", "", data.report.title));
      coverTitle.append(el("p", "property-name", data.property.name));
      coverTitle.append(el("p", "property-location", `${data.property.location} | ${data.report.date}`));
      cover.append(coverTitle);
      cover.append(mapPanel(data.maps.find((m) => m.id === "concept")));
      const prepared = el("div", "prepared-for");
      prepared.append(el("span", "", "Prepared for"));
      prepared.append(el("strong", "", data.client.name));
      prepared.append(el("span", "", data.business.name));
      cover.append(prepared);

      const summary = page();
      header(summary, "01 / Executive summary", "Plan snapshot", data.sections.executiveSummary.intro);
      summary.append(statGrid(data.sections.executiveSummary.stats));
      summary.append(callout("Overall recommendation", data.sections.executiveSummary.recommendation));
      summary.append(twoColumnList(data.sections.executiveSummary.findings));
      footer(summary);

      const overview = page();
      header(overview, "02 / Property overview", "Site context and assessment basis", data.sections.propertyOverview.intro);
      overview.append(mapPanel(data.maps.find((m) => m.id === "overview")));
      overview.append(statGrid(data.sections.propertyOverview.stats));
      overview.append(paragraphList(data.sections.propertyOverview.notes));
      footer(overview);

      const condition = page();
      header(condition, "03 / Existing landscape condition", "Current function, constraints and observed pressures", data.sections.condition.intro);
      condition.append(twoColumnList(data.sections.condition.items));
      condition.append(callout("Condition rating", data.sections.condition.rating));
      footer(condition);

      const photos = page();
      header(photos, "04 / Annotated site photos", "Observed condition, interpretation and practical response", data.sections.photos.intro);
      photos.append(photoGrid(data.sections.photos.items));
      footer(photos);

      const vegetationCondition = page();
      header(vegetationCondition, "05 / Vegetation condition", "Observed structure and likely reference vegetation", data.sections.vegetationCondition.intro);
      vegetationCondition.append(mapPanel(data.maps.find((m) => m.id === "vegetation")));
      vegetationCondition.append(twoColumnList(data.sections.vegetationCondition.items));
      vegetationCondition.append(callout("Likely EVC / reference vegetation", data.sections.vegetationCondition.evcNote));
      footer(vegetationCondition);

      const water = page();
      header(water, "06 / Landform and water movement", "Reading the landscape before prescribing works", data.sections.water.intro);
      const mapGrid = el("div", "map-grid");
      mapGrid.append(mapPanel(data.maps.find((m) => m.id === "landform")));
      mapGrid.append(mapPanel(data.maps.find((m) => m.id === "water")));
      water.append(mapGrid);
      water.append(twoColumnList(data.sections.water.items));
      footer(water);

      const ripping = page();
      header(ripping, "07 / Proposed ripping zones", "Where to rip, why, when and at what approximate scale", data.sections.ripping.intro);
      ripping.append(mapPanel(data.maps.find((m) => m.id === "concept")));
      ripping.append(dataTable(["Zone", "Area", "Purpose", "Priority", "Timing", "Notes"], data.sections.ripping.rows, ["zone", "area", "purpose", "priority", "timing", "notes"]));
      footer(ripping);

      const planting = page();
      header(planting, "08 / Proposed planting zones", "Functional revegetation treatments by location", data.sections.planting.intro);
      planting.append(mapPanel(data.maps.find((m) => m.id === "vegetation")));
      planting.append(dataTable(["Zone", "Treatment", "Area/length", "Purpose", "Establishment notes"], data.sections.planting.rows, ["zone", "treatment", "scale", "purpose", "notes"]));
      footer(planting);

      const species = page();
      header(species, "09 / Species recommendations", "Central Victorian species palette by planting zone", data.sections.species.intro);
      species.append(dataTable(["Planting zone", "Canopy", "Mid-storey", "Ground layer / notes"], data.sections.species.rows, ["zone", "canopy", "mid", "ground"]));
      species.append(callout("Species selection note", data.sections.species.note));
      footer(species);

      const works = page();
      header(works, "10 / Recommended works", "Contractor-ready works package", data.sections.works.intro);
      works.append(worksTable(data.sections.works.rows));
      works.append(callout("Delivery note", data.sections.works.note));
      footer(works);

      const budget = page();
      header(budget, "11 / Indicative quantities and costing", "Scalable investment pathways and approximate quantities", data.sections.budget.intro);
      budget.append(dataTable(["Item", "Indicative quantity", "Unit allowance", "Indicative cost"], data.sections.budget.quantities, ["item", "quantity", "unit", "cost"]));
      budget.append(budgetOptions(data.sections.budget.options));
      budget.append(paragraphList(data.sections.budget.notes));
      footer(budget);

      const staging = page();
      header(staging, "12 / Staged works program", "Suggested order of works", data.sections.staging.intro);
      const timeline = el("ol", "timeline");
      data.sections.staging.steps.forEach((step) => {
        const item = el("li", "");
        item.append(el("span", "", step.phase));
        item.append(el("h3", "", step.title));
        item.append(el("p", "", step.body));
        timeline.append(item);
      });
      staging.append(timeline);
      footer(staging);

      const next = page();
      header(next, "13 / Next steps", "From plan to implementation", data.sections.nextSteps.intro);
      next.append(twoColumnList(data.sections.nextSteps.items));
      next.append(callout("Recommended immediate action", data.sections.nextSteps.action));
      footer(next);
    </script>
  </body>
</html>
